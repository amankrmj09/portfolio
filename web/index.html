<!DOCTYPE html>
<html lang="en">
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="my portfolio" name="description">

    <!-- iOS meta tags & icons -->
    <meta content="yes" name="mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="portfolio" name="apple-mobile-web-app-title">
    <link href="icons/Icon-192.png" rel="apple-touch-icon">

    <!-- SEO Meta Tags -->
    <meta content="Portfolio website of Aman Kumar showcasing projects, skills, and experience"
          name="description">
    <meta content="Aman Kumar, portfolio, developer, projects" name="keywords">

    <!-- Open Graph / Facebook -->
    <meta content="website" property="og:type">
    <meta content="https://amankrmj01.github.io/portfolio/" property="og:url">
    <meta content="Aman Kumar - Portfolio" property="og:title">
    <meta content="Portfolio website of Aman Kumar showcasing projects, skills, and experience"
          property="og:description">
    <meta content="icons/Icon-512.png" property="og:image">

    <!-- Twitter -->
    <meta content="summary_large_image" property="twitter:card">
    <meta content="https://amankrmj01.github.io/portfolio/" property="twitter:url">
    <meta content="Aman Kumar - Portfolio" property="twitter:title">
    <meta content="Portfolio website of Aman Kumar showcasing projects, skills, and experience"
          property="twitter:description">
    <meta content="icons/Icon-512.png" property="twitter:image">

    <!-- Favicon -->
    <link href="favicon.ico" rel="icon" type="image/png"/>

    <title>Aman Kumar</title>
    <link href="manifest.json" rel="manifest">
    <style>
        html, body {
          width: 100%;
          min-width: 0;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          overflow-x: hidden;
        }
        #flt-glass-pane, #app-container {
          width: 100vw !important;
          min-width: 0;
        }
    </style>
</head>
<body>
<script async src="flutter_bootstrap.js"></script>
</body>
</html>

name: portfolio
description: "My Portfolio Website using Flutter"
publish_to: 'none'

version: 4.0.2+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  font_awesome_flutter: ^10.10.0


  #*Architecture
  flutter_hooks: ^0.21.3+1
  url_strategy: ^0.3.0

  #*Services
  url_launcher: ^6.3.2
  http: ^1.5.0

  #*Services
  animated_text_kit: ^4.2.3
  animations: ^2.0.11
  get: ^4.7.2
  flutter_svg: ^2.2.1
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  atlas_icons: ^0.0.12
  pretty_animated_text: ^2.0.0
  mesh_gradient: ^1.3.8
  aura_box: ^1.0.2
  crypto: ^3.0.6
  intl: ^0.20.2
  logger: ^2.6.1
  animated_containers: ^1.2.0

  freezed_annotation: ^3.1.0
  json_serializable: ^6.11.1
  json_annotation: ^4.9.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.8.0
  freezed: ^3.2.3
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
    - family: ShantellSans
      fonts:
        - asset: assets/fonts/shantell_sans/ShantellSans-Regular.ttf
        - asset: assets/fonts/shantell_sans/ShantellSans-Bold.ttf
        - asset: assets/fonts/shantell_sans/ShantellSans-Italic.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/notosans/NotoSans-Regular.ttf
        - asset: assets/fonts/notosans/NotoSans-Bold.ttf
        - asset: assets/fonts/notosans/NotoSans-Italic.ttf
        - asset: assets/fonts/notosans/NotoSans-BoldItalic.ttf
